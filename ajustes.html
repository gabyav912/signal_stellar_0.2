<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Señal Stellar - Ajustes</title>
    <style>
        :root {
            --fondo: #0b0b0b;
            --panel: #1b1b1b;
            --panel2: #242424;
            --borde: #343434;
            --texto: #ffffff;
            --texto2: #bdbdbd;
            --dorado: #d4af37;
            --verde: #2db35f;
            --rojo: #d14b4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--fondo);
            font-family: "Times New Roman", serif;
            color: var(--texto);
            padding: 30px;
        }

        .main {
            max-width: 1150px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h1 {
            color: var(--dorado);
            font-size: 38px;
            margin-bottom: 5px;
        }

        .descripcion {
            color: var(--texto2);
            font-size: 18px;
            margin-bottom: 10px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--borde);
            border-radius: 15px;
            padding: 25px;
        }

        .panel h2 {
            color: var(--dorado);
            font-size: 27px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            margin-bottom: 8px;
            font-size: 17px;
            color: var(--texto2);
        }

        input[type="color"] {
            width: 80px;
            height: 45px;
            border: none;
            background: none;
            cursor: pointer;
        }

        select {
            background: #101010;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
        }

        input[type="range"] {
            width: 100%;
        }

        .valorVolumen {
            margin-top: 8px;
            font-size: 16px;
            color: var(--texto2);
        }

        .switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 12px;
        }

        .switch span {
            font-size: 17px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .botonesTema {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .botonesTema button {
            padding: 12px 20px;
            background: #303030;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: .2s;
        }

        .botonesTema button:hover {
            background: #444;
        }

        .botonesTema button.activo {
            background: var(--dorado);
            color: black;
            font-weight: bold;
        }

        .acciones {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 5px;
        }

        .acciones button {
            padding: 14px 22px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
        }

        .guardar {
            background: var(--verde);
            color: white;
        }

        .reiniciar {
            background: var(--rojo);
            color: white;
        }

        @media(max-width:850px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="main">
    <div>
        <h1>Ajustes</h1>
        <p class="descripcion">Personaliza Señal Stellar a tu gusto.</p>
    </div>

    <div class="acciones">
        <button class="reiniciar" onclick="restablecerConfiguracion()">Restablecer configuración</button>
        <button class="guardar" onclick="guardarConfiguracion()">Guardar cambios</button>
    </div>

    <div class="grid">
        <!-- PANEL: COLORES -->
        <div class="panel">
            <h2>Colores del temporizador</h2>
            <div class="campo">
                <label>Color del cartel "Acción"</label>
                <input type="color" id="color-accion" value="#ff3b30">
            </div>
            <div class="campo">
                <label>Color del cartel "Break"</label>
                <input type="color" id="color-break" value="#00c853">
            </div>
        </div>

        <!-- PANEL: TIEMPOS -->
        <div class="panel">
            <h2>Tiempos</h2>
            <div class="campo">
                <label>Tiempo Pomodoro</label>
                <select id="tiempo-pomodoro"></select>
            </div>
            <div class="campo">
                <label>Tiempo Break</label>
                <select id="tiempo-break"></select>
            </div>
            <div class="campo">
                <label>Tiempo Descanso</label>
                <select id="tiempo-descanso"></select>
            </div>
            <div class="campo">
                <label>Cantidad de Pomodoros (Repeticiones)</label>
                <select id="repeticiones-pomodoro">
                    <option value="2">2 Pomodoros</option>
                    <option value="3">3 Pomodoros</option>
                    <option value="4">4 Pomodoros (Recomendado)</option>
                    <option value="5">5 Pomodoros</option>
                    <option value="6">6 Pomodoros</option>
                </select>
            </div>
        </div>

        <!-- PANEL: SONIDO -->
        <div class="panel">
            <h2>Sonido</h2>
            <div class="campo">
                <label>Sonido de la alarma</label>
                <select id="sonido-alarma"></select>
            </div>
            <div class="campo">
                <label>Volumen</label>
                <input type="range" id="volumen-alarma" min="0" max="100" value="80">
                <div class="valorVolumen" id="volumen-valor">80%</div>
            </div>
            <div class="switch">
                <span>Activar sonido</span>
                <input type="checkbox" id="activar-sonido" checked>
            </div>
        </div>

        <!-- PANEL: NOTIFICACIONES -->
        <div class="panel">
            <h2>Notificaciones</h2>
            <div class="switch">
                <span>Mostrar notificación al finalizar</span>
                <input type="checkbox" id="mostrar-notificacion" checked>
            </div>
            <div class="switch">
                <span>Reproducir música durante Pomodoro</span>
                <input type="checkbox" id="musica-temporizador" checked>
            </div>
            <div class="switch">
                <span>Reproducir música durante Break</span>
                <input type="checkbox" id="musica-break" checked>
            </div>
        </div>

        <!-- PANEL: APARIENCIA -->
        <div class="panel">
            <h2>Apariencia</h2>
            <div class="campo">
                <label>Tema de la aplicación</label>
                <div class="botonesTema" id="tema-group">
                    <button type="button" data-value="oscuro">Oscuro</button>
                    <button type="button" data-value="claro">Claro</button>
                </div>
            </div>
            <div class="campo">
                <label>Estilo del temporizador</label>
                <div class="botonesTema" id="estilo-group">
                    <button type="button" data-value="circular">Circular</button>
                    <button type="button" data-value="barra">Barra</button>
                </div>
            </div>
        </div>

        <!-- PANEL: VISTA PREVIA -->
        <div class="panel">
            <h2>Vista previa</h2>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1; min-width:220px; background:#111; border-radius:12px; padding:20px; text-align:center; border:1px solid #333;">
                    <h3 style="margin-bottom:15px; color:#d4af37;">Acción</h3>
                    <div id="preview-accion" style="height:70px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; background:#ff3b30;">
                        ACCIÓN
                    </div>
                </div>
                <div style="flex:1; min-width:220px; background:#111; border-radius:12px; padding:20px; text-align:center; border:1px solid #333;">
                    <h3 style="margin-bottom:15px; color:#d4af37;">Break</h3>
                    <div id="preview-break" style="height:70px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; background:#00c853;">
                        BREAK
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const defaultConfig = {
        colorAccion: "#ff3b30",
        colorBreak: "#00c853",
        tiempoPomodoro: "25",
        tiempoBreak: "5",
        tiempoDescanso: "15",
        repeticionesPomodoro: "4",
        sonidoAlarma: "ascensor.ogg",
        volumenAlarma: 80,
        activarSonido: true,
        mostrarNotificacion: true,
        musicaTemporizador: true,
        musicaBreak: true,
        tema: "oscuro",
        estiloTemporizador: "circular"
    };

    const configKey = "senalStellarAjustes";
    let config = loadConfig();

    // Elementos del DOM
    const tiempoPomodoro = document.getElementById("tiempo-pomodoro");
    const tiempoBreak = document.getElementById("tiempo-break");
    const tiempoDescanso = document.getElementById("tiempo-descanso");
    const repeticionesPomodoro = document.getElementById("repeticiones-pomodoro");
    const sonidoAlarma = document.getElementById("sonido-alarma");
    const volumen = document.getElementById("volumen-alarma");
    const volumenValor = document.getElementById("volumen-valor");
    const colorAccion = document.getElementById("color-accion");
    const colorBreak = document.getElementById("color-break");
    const previewAccion = document.getElementById("preview-accion");
    const previewBreak = document.getElementById("preview-break");

    const tiempos = [
        ["3", "3 minutos"], ["5", "5 minutos"], ["10", "10 minutos"],
        ["15", "15 minutos"], ["20", "20 minutos"], ["25", "25 minutos"],
        ["30", "30 minutos"], ["35", "35 minutos"], ["40", "40 minutos"],
        ["45", "45 minutos"], ["50", "50 minutos"], ["60", "60 minutos"]
    ];

    const sonidos = [
        ["ascensor.ogg", "Ascensor"], ["cheked.ogg", "Checked"],
        ["cristal.ogg", "Cristal"], ["elegante.ogg", "Elegante"],
        ["error.ogg", "Error"], ["future.ogg", "Future"],
        ["soft.ogg", "Soft"], ["stellar.ogg", "Stellar"],
        ["the_space.ogg", "The Space"]
    ];

    function cargarSelect(select, datos) {
        select.innerHTML = "";
        datos.forEach(item => {
            const option = document.createElement("option");
            option.value = item[0];
            option.textContent = item[1];
            select.appendChild(option);
        });
    }

    // Inicializar Selects
    cargarSelect(tiempoPomodoro, tiempos);
    cargarSelect(tiempoBreak, tiempos);
    cargarSelect(tiempoDescanso, tiempos);
    cargarSelect(sonidoAlarma, sonidos);

    // Cargar valores de la configuración al DOM
    colorAccion.value = config.colorAccion;
    colorBreak.value = config.colorBreak;
    tiempoPomodoro.value = config.tiempoPomodoro;
    tiempoBreak.value = config.tiempoBreak;
    tiempoDescanso.value = config.tiempoDescanso;
    repeticionesPomodoro.value = config.repeticionesPomodoro;
    sonidoAlarma.value = config.sonidoAlarma;
    volumen.value = config.volumenAlarma;
    volumenValor.textContent = config.volumenAlarma + "%";
    
    document.getElementById("activar-sonido").checked = config.activarSonido;
    document.getElementById("mostrar-notificacion").checked = config.mostrarNotificacion;
    document.getElementById("musica-temporizador").checked = config.musicaTemporizador;
    document.getElementById("musica-break").checked = config.musicaBreak;

    actualizarVista();
    aplicarTema();

    // Event Listeners
    colorAccion.addEventListener("input", actualizarVista);
    colorBreak.addEventListener("input", actualizarVista);
    volumen.addEventListener("input", function() {
        volumenValor.textContent = this.value + "%";
    });

    document.querySelectorAll("#tema-group button").forEach(function(btn) {
        btn.onclick = function() {
            document.querySelectorAll("#tema-group button").forEach(b => b.classList.remove("activo"));
            btn.classList.add("activo");
            config.tema = btn.dataset.value;
            aplicarTema();
        };
    });

    document.querySelectorAll("#estilo-group button").forEach(function(btn) {
        btn.onclick = function() {
            document.querySelectorAll("#estilo-group button").forEach(b => b.classList.remove("activo"));
            btn.classList.add("activo");
            config.estiloTemporizador = btn.dataset.value;
        };
    });

    function actualizarVista() {
        previewAccion.style.background = colorAccion.value;
        previewBreak.style.background = colorBreak.value;
    }

    function aplicarTema() {
        if (config.tema === "claro") {
            document.body.style.background = "#efefef";
            document.body.style.color = "#111";
            document.documentElement.style.setProperty("--fondo", "#efefef");
            document.documentElement.style.setProperty("--panel", "#ffffff");
            document.documentElement.style.setProperty("--panel2", "#f4f4f4");
            document.documentElement.style.setProperty("--texto", "#111111");
            document.documentElement.style.setProperty("--texto2", "#555555");
        } else {
            document.documentElement.style.setProperty("--fondo", "#0b0b0b");
            document.documentElement.style.setProperty("--panel", "#1b1b1b");
            document.documentElement.style.setProperty("--panel2", "#242424");
            document.documentElement.style.setProperty("--texto", "#ffffff");
            document.documentElement.style.setProperty("--texto2", "#bdbdbd");
            document.body.style.background = "#0b0b0b";
            document.body.style.color = "#ffffff";
        }

        document.querySelectorAll("#tema-group button").forEach(btn => {
            btn.classList.remove("activo");
            if (btn.dataset.value === config.tema) btn.classList.add("activo");
        });

        document.querySelectorAll("#estilo-group button").forEach(btn => {
            btn.classList.remove("activo");
            if (btn.dataset.value === config.estiloTemporizador) btn.classList.add("activo");
        });
    }

    function guardarConfiguracion() {
        config.colorAccion = colorAccion.value;
        config.colorBreak = colorBreak.value;
        config.tiempoPomodoro = tiempoPomodoro.value;
        config.tiempoBreak = tiempoBreak.value;
        config.tiempoDescanso = tiempoDescanso.value;
        config.repeticionesPomodoro = repeticionesPomodoro.value;
        config.sonidoAlarma = sonidoAlarma.value;
        config.volumenAlarma = Number(volumen.value);
        config.activarSonido = document.getElementById("activar-sonido").checked;
        config.mostrarNotificacion = document.getElementById("mostrar-notificacion").checked;
        config.musicaTemporizador = document.getElementById("musica-temporizador").checked;
        config.musicaBreak = document.getElementById("musica-break").checked;

        localStorage.setItem(configKey, JSON.stringify(config));
        showToast("Configuración guardada correctamente.");
    }

    function restablecerConfiguracion() {
        if (!confirm("¿Desea restablecer la configuración?")) return;
        localStorage.removeItem(configKey);
        config = { ...defaultConfig };
        location.reload();
    }

    function loadConfig() {
        const datos = localStorage.getItem(configKey);
        if (datos) {
            try {
                return { ...defaultConfig, ...JSON.parse(datos) };
            } catch (e) {
                return { ...defaultConfig };
            }
        }
        return { ...defaultConfig };
    }

    function showToast(texto) {
        const aviso = document.createElement("div");
        aviso.innerHTML = texto;
        aviso.style.position = "fixed";
        aviso.style.right = "25px";
        aviso.style.bottom = "25px";
        aviso.style.background = "#2db35f";
        aviso.style.color = "white";
        aviso.style.padding = "15px 22px";
        aviso.style.borderRadius = "10px";
        aviso.style.fontSize = "16px";
        aviso.style.boxShadow = "0 0 15px rgba(0,0,0,.4)";
        aviso.style.zIndex = "9999";
        document.body.appendChild(aviso);

        setTimeout(function() {
            aviso.remove();
        }, 2500);
    }
</script>

</body>
</html>
