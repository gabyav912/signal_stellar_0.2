<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Señal Stellar - Módulo de Música</title>
    <style>
        :root {
            --fondo: #0a0a0f;
            --borde: #44444c;
            --texto: #ffffff;
            --dorado: #ffd700;
            --magenta: #d81b60;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .contenedor-musica {
            width: 100%;
            max-width: 600px;
            background: #121212;
            border: 4px solid var(--borde);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            color: var(--dorado);
            margin-bottom: 20px;
        }

        .estado-caja {
            background: #1c1c1c;
            border: 2px solid var(--borde);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-pista {
            color: var(--magenta);
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="contenedor-musica">
        <h1>REPRODUCTOR STELLAR</h1>
        <div class="estado-caja">
            <p id="estado-texto">Estado: Esperando orden del temporizador...</p>
            <div class="info-pista" id="pista-texto">Pista: Ninguna</div>
        </div>
    </div>

    <script>
        const canalMusicaKey = "senalStellarComandoMusica";
        
        // Reproductor de audio nativo
        let audioActual = new Audio();
        let indiceCancionActual = 0;

        // Listas de ejemplo (reemplazar o conectar con tus pistas de IndexedDB)
        let playlistAccion = [
            { nombre: "Acción - Pista 1", url: "audio/accion1.mp3" },
            { nombre: "Acción - Pista 2", url: "audio/accion2.mp3" }
        ];

        let playlistBreak = [
            { nombre: "Break - Chill 1", url: "audio/break1.mp3" }
        ];

        let listaActual = playlistAccion;

        // REPRODUCCIÓN CONTINUA Y AUTOMÁTICA
        function reproducirCancion(indice) {
            // Si supera el final de la lista, vuelve al inicio
            if (indice >= listaActual.length) {
                indice = 0;
            }

            indiceCancionActual = indice;
            const cancion = listaActual[indiceCancionActual];

            if (cancion && cancion.url) {
                audioActual.src = cancion.url;
                document.getElementById("pista-texto").textContent = "Pista: " + cancion.nombre;

                audioActual.play().catch(e => console.log("Esperando interacción de usuario..."));

                // EVENTO DE CONTINUIDAD AUTOMÁTICA
                audioActual.onended = function() {
                    reproducirCancion(indiceCancionActual + 1);
                };
            }
        }

        // DETECTOR DE COMANDOS DEL TEMPORIZADOR
        window.addEventListener('storage', function(event) {
            if (event.key === canalMusicaKey && event.newValue) {
                try {
                    const comando = JSON.parse(event.newValue);
                    
                    // Selección de la lista según la fase del temporizador
                    listaActual = (comando.tipo === "accion") ? playlistAccion : playlistBreak;

                    if (comando.estado === "play") {
                        document.getElementById("estado-texto").textContent = "Estado: Reproduciendo (" + comando.tipo + ")";
                        document.getElementById("estado-texto").style.color = "#00e676";
                        reproducirCancion(indiceCancionActual);

                    } else if (comando.estado === "stop") {
                        document.getElementById("estado-texto").textContent = "Estado: Pausado / Tiempo Agotado";
                        document.getElementById("estado-texto").style.color = "#ff3d00";
                        
                        // CORTE BRUTO INSTANTÁNEO
                        audioActual.pause();
                    }
                } catch (e) {
                    console.error("Error al procesar el comando de música:", e);
                }
            }
        });
    </script>
</body>
</html>
