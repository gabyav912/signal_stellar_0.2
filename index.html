<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Señal Stellar</title>
<link rel="icon" type="image/png" href="logo_signal_stellar.png">

<style>
body{
    background-color:#000000;
    color:white;
    font-family:sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

header h1{
    color:gold;
    font-family:"Times New Roman",serif;
}

form{
    display:flex;
    flex-direction:column;
}

.fila{
    display:flex;
    gap:30px;
}

.columna{
    width:50%;
    display:flex;
    flex-direction:column;
}

label{
    margin-top:15px;
}

input,
select,
textarea{
    padding:10px;
    margin-top:5px;
}

.botones{
    display:flex;
    gap:20px;
    margin-top:25px;
}

button{
    padding:15px;
    background:#00ff73cb;
    color:black;
    border:none;
    cursor:pointer;
    font-family:"Times New Roman",serif;
    font-size:18px;
}
</style>

</head>


<body>

<header>
<h1>SEÑAL STELLAR</h1>
</header>

<form action="main.html" method="get">

<h2>Registro de usuario</h2>

<p>Completa los siguientes datos para crear tu cuenta.</p>

<div class="fila">

<div class="columna">

<label for="usuario">Nombre de usuario:</label>
<input
type="text"
id="usuario"
name="usuario"
placeholder="Ej: usuario123"
required
minlength="4"
maxlength="15"
pattern="[A-Za-z0-9]+"
title="Solo letras y números. Entre 4 y 15 caracteres.">

<label for="nombre">Nombre:</label>
<input
type="text"
id="nombre"
name="nombre"
placeholder="Ingrese su nombre"
required>

<label for="apellido">Apellido:</label>
<input
type="text"
id="apellido"
name="apellido"
placeholder="Ingrese su apellido"
required>

<label for="correo">Correo electrónico:</label>
<input
type="email"
id="correo"
name="correo"
placeholder="ejemplo@gmail.com"
required>

</div>

<div class="columna">

<label for="clave">Contraseña:</label>
<input
type="password"
id="clave"
name="clave"
placeholder="Mínimo 9 caracteres"
minlength="9"
maxlength="20"
required>

<label for="confirmar">Confirmar contraseña:</label>
<input
type="password"
id="confirmar"
name="confirmar"
placeholder="Repita la contraseña"
minlength="9"
maxlength="20"
required>

<label for="fecha">Fecha de nacimiento:</label>
<input
type="date"
id="fecha"
name="fecha"
required>

<label for="pais">País:</label>
<select id="pais" name="pais" required>
<option value="">Seleccione un país</option>
<option>Argentina</option>
<option>Bolivia</option>
<option>Brasil</option>
<option>Chile</option>
<option>Colombia</option>
<option>Paraguay</option>
<option>Perú</option>
<option>Uruguay</option>
<option>Venezuela</option>
<option>Otro</option>
</select>

<label for="foto">Foto de perfil:</label>
<input
type="file"
id="foto"
name="foto"
accept="image/*">

</div>

</div>

<label for="comentarios">Comentarios:</label>

<textarea
id="comentarios"
name="comentarios"
rows="5"
placeholder="Escriba aquí algún comentario (opcional).">
</textarea>

<br>

<label>
<input type="checkbox" required>
Acepto los términos y condiciones.
</label>

<div class="botones">

<button type="submit">
<strong>Crear cuenta</strong>
</button>

<button type="reset">
<strong>Borrar datos</strong>
</button>

</div>

</form>
<script>

document.querySelector("form").addEventListener("submit", function(){

localStorage.setItem("usuario", document.getElementById("usuario").value);

localStorage.setItem("nombre", document.getElementById("nombre").value);

localStorage.setItem("apellido", document.getElementById("apellido").value);

localStorage.setItem("correo", document.getElementById("correo").value);

localStorage.setItem("pais", document.getElementById("pais").value);

});

</script>
</body>

</html>
